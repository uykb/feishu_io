version: '3.8'

services:
  copycat-bot:
    image: copycat-bot:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: copycat-bot
    restart: unless-stopped
    
    environment:
      - LARK_WEBHOOK_URL=${LARK_WEBHOOK_URL}
      - OI_THRESHOLD=${OI_THRESHOLD:-5.0}
      - PRICE_THRESHOLD=${PRICE_THRESHOLD:-2.0}
      - CHECK_INTERVAL=${CHECK_INTERVAL:-60}
      - MIN_CHECK_INTERVAL=${MIN_CHECK_INTERVAL:-10}
      - ADX_THRESHOLD=${ADX_THRESHOLD:-20.0}
      - ATR_PERIOD=${ATR_PERIOD:-14}
      - ADX_PERIOD=${ADX_PERIOD:-14}
      - STOP_LOSS_MULTIPLIER=${STOP_LOSS_MULTIPLIER:-1.5}
      - RISK_AMOUNT=${RISK_AMOUNT:-1.0}
      - LARK_TIMEOUT=${LARK_TIMEOUT:-10}
      - SOCKS5_PROXY=${SOCKS5_PROXY}
      - BULLISH_BREAKOUT_WEIGHT=${BULLISH_BREAKOUT_WEIGHT:-1.0}
      - BEARISH_MOMENTUM_WEIGHT=${BEARISH_MOMENTUM_WEIGHT:-1.0}
      - POSSIBLE_FAKEOUT_WEIGHT=${POSSIBLE_FAKEOUT_WEIGHT:-1.0}
      - MARKET_CONTRACTION_WEIGHT=${MARKET_CONTRACTION_WEIGHT:-1.0}
      - HYPE_ONLY_MODE=${HYPE_ONLY_MODE:-true}
      - HYPE_SYMBOL=${HYPE_SYMBOL:-HYPEUSDT}
      - HYPE_OI_STOP_THRESHOLD=${HYPE_OI_STOP_THRESHOLD:--0.15}
      - HYPE_FR_EXTREME_THRESHOLD=${HYPE_FR_EXTREME_THRESHOLD:--0.0005}
      - HYPE_FR_RECOVERY_THRESHOLD=${HYPE_FR_RECOVERY_THRESHOLD:-0.3}
      - HYPE_HIGHER_LOW_PCT=${HYPE_HIGHER_LOW_PCT:-0.3}
      - HYPE_SQUEEZE_PRICE_PCT=${HYPE_SQUEEZE_PRICE_PCT:-0.5}
      - HYPE_SQUEEZE_OI_DECLINE_PCT=${HYPE_SQUEEZE_OI_DECLINE_PCT:-0.05}
      - HYPE_COOLDOWN_MINUTES=${HYPE_COOLDOWN_MINUTES:-15}
      - HYPE_LOOKBACK_KLINES=${HYPE_LOOKBACK_KLINES:-12}
      - HYPE_FUNDING_INTERVAL=${HYPE_FUNDING_INTERVAL:-30}
      - HYPERLIQUID_ENABLED=${HYPERLIQUID_ENABLED:-false}
      - HYPERLIQUID_OI_INTERVAL=${HYPERLIQUID_OI_INTERVAL:-10}
      - HYPERLIQUID_FUNDING_INTERVAL=${HYPERLIQUID_FUNDING_INTERVAL:-60}
      - HYPE_HL_OI_STOP_THRESHOLD=${HYPE_HL_OI_STOP_THRESHOLD:--0.10}
      - HYPE_HL_FR_EXTREME_THRESHOLD=${HYPE_HL_FR_EXTREME_THRESHOLD:--0.0001}
      - HYPE_HL_FR_RECOVERY_THRESHOLD=${HYPE_HL_FR_RECOVERY_THRESHOLD:-0.3}
      - HYPE_HL_SQUEEZE_PRICE_PCT=${HYPE_HL_SQUEEZE_PRICE_PCT:-0.5}
      - HYPE_HL_SQUEEZE_OI_DECLINE_PCT=${HYPE_HL_SQUEEZE_OI_DECLINE_PCT:-0.05}
      - TZ=Asia/Shanghai
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    
    networks:
      - binance-net

networks:
  binance-net:
    driver: bridge
